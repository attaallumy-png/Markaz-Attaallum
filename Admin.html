<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELAIN ADMIN DILARANG MASUK</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #020617; color: white; padding: 20px; text-align: center; }
        .box { background: #0f172a; max-width: 500px; margin: 50px auto; padding: 30px; border-radius: 15px; border: 1px solid #10b981; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155; }
        button { width: 95%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #hasil-data { margin-top: 20px; background: #020617; padding: 15px; border-radius: 10px; text-align: left; display: none; }
        .baris { border-bottom: 1px solid #334155; padding: 8px 0; font-size: 14px; }
        .label { color: #94a3b8; font-size: 12px; display: block;}
    </style>
</head>
<body>

    <div class="box" id="loginArea">
        <h2>AREA KHUSUS ADMINITRASI</h2>
        <input type="password" id="pin" placeholder="Masukkan PIN (1234)">
        <button onclick="masuk()">BUKA DASHBOARD</button>
    </div>

    <div class="box" id="dashboardArea" style="display: none;">
        <h2>CARI DATA MURID</h2>
        <input type="text" id="keyword" placeholder="Ketik NIA atau Nama (Cth: NIA-123)">
        <button id="btnCari" onclick="cariData()">CARI DATA</button>

        <div id="hasil-data"></div>
    </div>

    <script>
        // PASTE URL BARU LU DI BAWAH INI (JANGAN HILANGIN TANDA KUTIPNYA)
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxaVMfTBLPYPZnBwAAHctxeMKvpnqQ5VsotPkNynwDHnQnvh52CC7NQsFlwRp_QSnlqqw/exec';

        function masuk() {
            if(document.getElementById('pin').value === 'LUTPIGANTENG') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('dashboardArea').style.display = 'block';
            } else { alert("PIN Salah!"); }
        }

        function cariData() {
            const keyword = document.getElementById('keyword').value.trim();
            if(keyword === "") return;
            
            const btn = document.getElementById('btnCari');
            const hasilBox = document.getElementById('hasil-data');
            
            btn.innerText = "MENCARI DATA... ⏳";
            btn.disabled = true;
            hasilBox.style.display = "none";
            hasilBox.innerHTML = "";

            // INI JURUS ANTI NYANGKUT: redirect 'follow' dan parameter URL
            const finalURL = scriptURL + "?nia=" + encodeURIComponent(keyword);

            fetch(finalURL, { method: 'GET', redirect: 'follow' })
            .then(res => res.json())
            .then(hasil => {
                if(hasil.status === "sukses") {
                    let isi = `<h4 style="color:#10b981; margin-top:0;">DITEMUKAN DI TAB: ${hasil.tab}</h4>`;
                    for(let kunci in hasil.data) {
                        isi += `<div class="baris"><span class="label">${kunci}</span><b>${hasil.data[kunci]}</b></div>`;
                    }
                    hasilBox.innerHTML = isi;
                    hasilBox.style.display = "block";
                } else {
                    alert(hasil.pesan);
                }
            })
            .catch(error => alert("Sistem Error. Cek URL Web App lu!"))
            .finally(() => { btn.innerText = "CARI DATA"; btn.disabled = false; });
        }
    </script>
</body>
</html>
