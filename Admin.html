<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markaz At-Ta'allum | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #020617;       
            --bg-card: #0f172a;       
            --bg-input: #1e293b;      
            --accent-glow: #10b981; /* Ijo Admin Luxury */
            --text-main: #f8fafc;     
            --text-dim: #94a3b8;      
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main); padding: 20px; }
        
        /* GERBANG LOGIN */
        #login-gate { max-width: 400px; margin: 100px auto; background: var(--bg-card); padding: 30px; border-radius: 15px; border: 1px solid rgba(16, 185, 129, 0.2); text-align: center; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
        input { width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; color: white; margin-bottom: 15px; font-family: 'Poppins'; text-align: center; }
        button { width: 100%; padding: 12px; background: var(--accent-glow); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* DASHBOARD UTAMA */
        #admin-panel { max-width: 700px; margin: 30px auto; display: none; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 20px; }
        .hasil-box { background: var(--bg-deep); padding: 15px; border-radius: 10px; border-left: 4px solid var(--accent-glow); margin-top: 15px; text-align: left; display: none; }
        .data-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 14px; }
        .data-label { color: var(--text-dim); }
        .data-val { font-weight: 600; color: white; }
    </style>
</head>
<body>

    <div id="login-gate">
        <i class="fa-solid fa-lock-open" style="font-size: 40px; color: var(--accent-glow); margin-bottom: 15px;"></i>
        <h2>Pusat Kendali Admin</h2>
        <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 20px;">Masukkan PIN Master Pengurus Markaz</p>
        <input type="password" id="pinAdmin" placeholder="Masukkan PIN Rahasia">
        <button onclick="cekKunciMasuk()">BUKA DASHBOARD 🔓</button>
    </div>

    <div id="admin-panel">
        <div class="card" style="text-align: center;">
            <h2 style="margin-bottom: 15px;"><i class="fa-solid fa-chart-line" style="color: var(--accent-glow);"></i> Sistem Verifikasi Data Santri</h2>
            <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 20px;">Masukkan NIA atau Nama Lengkap Santri untuk memanggil berkas dari Cloud</p>
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="searchKeyword" placeholder="Contoh: NIA341 atau LUTHFI" style="margin-bottom: 0; text-align: left; text-transform: uppercase;">
                <button onclick="cariDataSantriCloud()" id="btnCari" style="width: 130px;">CARI 🔍</button>
            </div>

            <div class="hasil-box" id="boxHasil">
                <h4 id="txtSumberTab" style="color: var(--accent-glow); margin-bottom: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">DATA FOUND IN SHEET</h4>
                <div id="areaDaftarData"></div>
            </div>
        </div>
    </div>

    <script>
        // PASTE URL WEB APP APPS SCRIPT LO YANG TERBARU DI SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxaVMfTBLPYPZnBwAAHctxeMKvpnqQ5VsotPkNynwDHnQnvh52CC7NQsFlwRp_QSnlqqw/exec';

        // 1. CEK PIN KUNCI MASUK (PIN BISA LO GANTI SESUAI SELERA)
        function cekKunciMasuk() {
            const pinInput = document.getElementById('pinAdmin').value;
            if (pinInput === "123456") { // Ganti "123456" pake PIN rahasia lo!
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                alert("PIN SALAH! Akses ditolak satpam Markaz! ❌");
            }
        }

        // 2. TEMBAK API UNTUK CARI DATA JALUR GET
        function cariDataSantriCloud() {
            const keyword = document.getElementById('searchKeyword').value.trim().toUpperCase();
            const btn = document.getElementById('btnCari');
            const box = document.getElementById('boxHasil');
            const area = document.getElementById('areaDaftarData');

            if(keyword === "") { alert("Ketik kodenya dulu cuy!"); return; }

            btn.innerText = "MENCARI...⏳";
            btn.disabled = true;
            box.style.display = "none";

            // Jalur GET murni pake parameter ?action=...&nia=...
            fetch(`${scriptURL}?action=cariSantri&nia=${encodeURIComponent(keyword)}`)
            .then(res => res.json())
            .then(hasil => {
                if(hasil.status === "sukses") {
                    document.getElementById('txtSumberTab').innerText = `📂 SUMBER KELAS: TAB ${hasil.tab}`;
                    area.innerHTML = "";
                    
                    // Looping otomatis untuk nampilin semua kolom yang ada di Sheet
                    for (let key in hasil.data) {
                        if(key === "fileData" || key === "nomorBarisExcel") continue; // Sembunyikan kolom sampah
                        
                        area.innerHTML += `
                            <div class="data-item">
                                <span class="data-label">${key}</span>
                                <span class="data-val">${hasil.data[key]}</span>
                            </div>
                        `;
                    }
                    box.style.display = "block";
                } else {
                    alert("Waduh: " + hasil.pesan);
                }
            })
            .catch(err => {
                console.error(err);
                alert("Gagal koneksi database terputus!");
            })
            .finally(() => {
                btn.innerText = "CARI 🔍";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
