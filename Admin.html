<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markaz At-Ta'allum | Admin Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* PURE LUXURY MINIMALIST VARIABLES */
        :root {
            --bg-deep: #050505;       
            --bg-card: rgba(18, 18, 18, 0.6);       
            --bg-input: rgba(255, 255, 255, 0.02);      
            --accent-glow: #C5A059; /* Matte Gold */
            --text-main: #f8fafc;     
            --text-dim: #71717a;      
            --glass-border: 1px solid rgba(197, 160, 89, 0.15);
            --luxury-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            padding: 20px;
            background: radial-gradient(circle at top right, rgba(197, 160, 89, 0.03), transparent 50%), #050505;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* GATEWAY CONTROL */
        #login-gate { 
            width: 100%;
            max-width: 420px; 
            margin: 0 auto; 
            background: var(--bg-card); 
            padding: 50px 40px; 
            border-radius: 8px; 
            border: var(--glass-border); 
            text-align: center; 
            box-shadow: var(--luxury-shadow);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }
        
        #login-gate h2 {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 20px;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        
        #login-gate p {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 35px;
        }

        /* TEXT INPUT SYSTEM */
        input { 
            width: 100%; 
            padding: 14px 18px; 
            background: var(--bg-input); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 4px; 
            color: white; 
            margin-bottom: 20px; 
            font-family: 'Poppins'; 
            text-align: center;
            font-size: 13px;
            letter-spacing: 1px;
            transition: all 0.4s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-glow);
            background: rgba(255, 255, 255, 0.04);
        }
        
        /* PREMIUM OUTLINED BUTTON */
        button { 
            width: 100%; 
            padding: 14px; 
            background: transparent; 
            border: 1px solid var(--accent-glow); 
            border-radius: 4px; 
            color: var(--accent-glow); 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.4s ease; 
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 11px;
        }
        button:hover { 
            background: var(--accent-glow);
            color: #050505;
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.15);
        }

        /* CENTRAL MANAGEMENT PANEL */
        #admin-panel { width: 100%; max-width: 680px; margin: 0 auto; display: none; }
        
        .card { 
            background: var(--bg-card); 
            padding: 45px 40px; 
            border-radius: 8px; 
            border: var(--glass-border); 
            box-shadow: var(--luxury-shadow);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            text-align: center;
        }
        
        .card h2 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .card p {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 35px;
        }
        
        /* CONTAINER DATA DATA */
        .hasil-box { 
            background: rgba(0, 0, 0, 0.2); 
            padding: 30px; 
            border-radius: 6px; 
            border-left: 2px solid var(--accent-glow); 
            margin-top: 40px; 
            text-align: left; 
            display: none; 
        }
        
        .data-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 14px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.02); 
            font-size: 13px; 
        }
        .data-item:last-child { border-bottom: none; }
        
        .data-label { 
            color: var(--text-dim); 
            text-transform: uppercase; 
            font-size: 10px; 
            letter-spacing: 2px; 
        }
        
        .data-val { 
            font-weight: 500; 
            color: var(--text-main); 
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="login-gate">
        <i class="fa-solid fa-shield-halved" style="font-size: 32px; color: var(--accent-glow);"></i>
        <h2>Internal Core</h2>
        <p>Athentication Required</p>
        <input type="password" id="pin" placeholder="ENTER ACCESS CODE">
        <button onclick="masuk()">Verify Integrity</button>
    </div>

    <div id="admin-panel">
        <div class="card">
            <h2>Registry Engine</h2>
            <p>Query student documentation from central cloud repository</p>
            
            <div style="display: flex; gap: 12px;">
                <input type="text" id="keyword" placeholder="SEARCH NIA OR FULL NAME" style="margin-bottom: 0; text-align: left; text-transform: uppercase;">
                <button id="btnCari" onclick="cariData()" style="width: 150px;">Execute</button>
            </div>

            <div class="hasil-box" id="hasil-data"></div>
        </div>
    </div>

    <script>
        // MASUKKAN URL RECENT DEPLOYMENT LU DI SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzi5Rb_VG2h65v1ENCK76kd1g2yq3YJbjOMiINZH_3EQ6NrIFSG57ozoqKg38lvOhHCwg/exec';

        function masuk() {
            if(document.getElementById('pin').value === '1234') {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else { 
                alert("ACCESS DENIED: Invalid Credentials."); 
            }
        }

        function cariData() {
            const keyword = document.getElementById('keyword').value.trim();
            if(keyword === "") return;
            
            const btn = document.getElementById('btnCari');
            const hasilBox = document.getElementById('hasil-data');
            
            btn.innerText = "Querying...";
            btn.disabled = true;
            hasilBox.style.display = "none";
            hasilBox.innerHTML = "";

            const finalURL = scriptURL + "?nia=" + encodeURIComponent(keyword);

            fetch(finalURL, { method: 'GET', redirect: 'follow' })
            .then(res => res.json())
            .then(hasil => {
                if(hasil.status === "sukses") {
                    let isi = `<h4 style="color: var(--accent-glow); font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px;">Database Source: Tab ${hasil.tab}</h4>`;
                    for(let kunci in hasil.data) {
                        if(kunci === "nomorBarisExcel" || kunci === "fileData") continue;
                        isi += `
                            <div class="data-item">
                                <span class="data-label">${kunci}</span>
                                <span class="data-val">${hasil.data[kunci]}</span>
                            </div>`;
                    }
                    hasilBox.innerHTML = isi;
                    hasilBox.style.display = "block";
                } else {
                    alert(hasil.pesan);
                }
            })
            .catch(error => alert("System Error: Connection Aborted."))
            .finally(() => { btn.innerText = "Execute"; btn.disabled = false; });
        }
    </script>
</body>
</html>
