<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Arcade | Markaz At-Ta'allum</title>
    
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #020617;       
            --bg-card: #0f172a;       
            --accent-glow: #3b82f6;   
            --text-main: #f8fafc;     
            --text-dim: #94a3b8;      
            --neon-glow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* HEADER SEDERHANA */
        header {
            width: 100%; padding: 15px 6%;
            background-color: var(--bg-card);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .back-btn {
            color: var(--text-dim); text-decoration: none; font-size: 14px;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .back-btn:hover { color: var(--accent-glow); }
        .header-title { font-weight: 700; color: var(--accent-glow); letter-spacing: 1px; }

        /* KOTAK GAME */
        .game-container {
            margin-top: 40px;
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 0 15px;
        }
        .game-title { font-size: 28px; margin-bottom: 5px; text-shadow: var(--neon-glow); }
        .game-desc { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; }

        canvas {
            background-color: var(--bg-card);
            border: 2px solid var(--accent-glow);
            border-radius: 12px;
            box-shadow: var(--neon-glow);
            width: 100%;
            max-width: 600px;
            height: 200px; /* Lebar mantap buat HP */
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }

        .btn-restart {
            margin-top: 25px;
            background-color: var(--accent-glow); color: white; border: none;
            padding: 10px 30px; border-radius: 30px; font-family: 'Poppins'; font-weight: 600;
            cursor: pointer; box-shadow: var(--neon-glow); transition: 0.3s; display: none;
        }
        .btn-restart:hover { transform: translateY(-3px); box-shadow: 0 0 25px rgba(59, 130, 246, 0.8); }

        .score-board {
            display: flex; justify-content: space-between; max-width: 600px;
            margin: 10px auto; padding: 0 10px; font-weight: 600; font-size: 18px; color: var(--accent-glow);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
        <div class="header-title"><i class="fa-solid fa-gamepad"></i> RUANG ARCADE</div>
    </header>

    <div class="game-container">
        <h1 class="game-title">TAALO RUN</h1>
        <p class="game-desc">Tekan <b>SPASI</b> atau <b>TAP LAYAR</b> untuk melompat!</p>

        <div class="score-board">
            <div>Skor: <span id="currentScore" style="color: white;">0</span></div>
            <div style="font-size: 14px; color: var(--text-dim); margin-top: 4px;">High Score: <span id="highScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="600" height="200"></canvas>
        <button class="btn-restart" id="btnRestart" onclick="resetGame()"><i class="fa-solid fa-rotate-right"></i> MAIN LAGI</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('currentScore');
        const highScoreElement = document.getElementById('highScore');
        const btnRestart = document.getElementById('btnRestart');

        // Gambar Karakter Taalo & Rintangan Buku
        let taaloImg = new Image(); 
        taaloImg.src = 'taalo.png'; // Pastiin file taalo.png ada di folder lu!
        
        // VARIABEL FISIKA GAME
        let taalo = { x: 50, y: 150, width: 35, height: 35, dy: 0, jumpPower: -10, grounded: false };
        let gravity = 0.6;
        let obstacles = [];
        let gameSpeed = 5;
        let score = 0;
        let bestScore = localStorage.getItem('taaloHighScore') || 0;
        let frameCount = 0;
        let isGameOver = false;
        let animationId;

        highScoreElement.innerText = bestScore;

        // FUNGSI MELOMPAT
        function jump() {
            if (isGameOver) return;
            if (taalo.grounded) {
                taalo.dy = taalo.jumpPower;
                taalo.grounded = false;
            }
        }

        // KONTROL: Spasi keyboard & Sentuh layar HP
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, {passive: false});
        canvas.addEventListener('mousedown', jump);

        // FUNGSI BIKIN RINTANGAN (KITA ANGGAP TUMPUKAN KITAB)
        function spawnObstacle() {
            let size = Math.random() * 20 + 20; // Tinggi rintangan acak
            obstacles.push({
                x: canvas.width,
                y: canvas.height - size,
                width: 20,
                height: size
            });
        }

        // MESIN UTAMA GAME (GAME LOOP)
        function update() {
            if (isGameOver) return;
            
            // Bersihin layar tiap frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. FISIKA TAALO (GRAVITASI)
            taalo.dy += gravity;
            taalo.y += taalo.dy;

            // Nabrak lantai?
            if (taalo.y + taalo.height >= canvas.height) {
                taalo.y = canvas.height - taalo.height;
                taalo.dy = 0;
                taalo.grounded = true;
            }

            // Gambar Taalo (Kalau gambar gagal load, ganti jadi kotak biru)
            if(taaloImg.complete) {
                ctx.drawImage(taaloImg, taalo.x, taalo.y, taalo.width, taalo.height);
            } else {
                ctx.fillStyle = '#3b82f6';
                ctx.fillRect(taalo.x, taalo.y, taalo.width, taalo.height);
            }

            // 2. SISTEM RINTANGAN
            frameCount++;
            // Bikin rintangan makin sering seiring berjalannya waktu
            if (frameCount % Math.max(60, 120 - Math.floor(score/100)) === 0) {
                spawnObstacle();
            }

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= gameSpeed; // Gerakin ke kiri

                // Gambar rintangan (warna merah bata ala tumpukan buku)
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // CEK TABRAKAN (COLLISION DETECTION)
                if (
                    taalo.x < obs.x + obs.width &&
                    taalo.x + taalo.width > obs.x &&
                    taalo.y < obs.y + obs.height &&
                    taalo.y + taalo.height > obs.y
                ) {
                    gameOver();
                }
            }

            // Hapus rintangan yang udah lewat layar biar gak menuhin RAM
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);

            // 3. SISTEM SKOR & TINGKAT KESULITAN
            score++;
            scoreElement.innerText = Math.floor(score / 10); // Bagi 10 biar jalannya gak kekencengan
            
            // Game makin cepet tiap dapet 500 poin!
            if (score % 500 === 0) gameSpeed += 0.5;

            // Panggil frame berikutnya
            animationId = requestAnimationFrame(update);
        }

        // FUNGSI KALAU MATI
        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationId);
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "bold 24px Poppins";
            ctx.textAlign = "center";
            ctx.fillText("YAHH NABRAK KITAB! 😭", canvas.width/2, canvas.height/2);
            
            btnRestart.style.display = "block"; // Munculin tombol main lagi

            // Cek High Score
            let finalScore = Math.floor(score / 10);
            if (finalScore > bestScore) {
                bestScore = finalScore;
                localStorage.setItem('taaloHighScore', bestScore);
                highScoreElement.innerText = bestScore;
                ctx.fillStyle = "#10b981";
                ctx.fillText("REKOR BARU!", canvas.width/2, canvas.height/2 + 35);
            }
        }

        // FUNGSI MAIN LAGI
        function resetGame() {
            taalo.y = 150;
            taalo.dy = 0;
            obstacles = [];
            score = 0;
            gameSpeed = 5;
            frameCount = 0;
            isGameOver = false;
            btnRestart.style.display = "none";
            update();
        }

        // MULAI GAME PERTAMA KALI
        update();
    </script>
</body>
</html>
