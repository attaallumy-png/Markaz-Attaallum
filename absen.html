<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Absen | Markaz At-Ta'allum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #0B1528 0%, #050814 100%);
            --card-blue: rgba(14, 22, 41, 0.8);     
            --accent-blue: #3B82F6;   
            --accent-green: #10B981;
            --text-light: #F8FAFC;
            --text-muted: #64748B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background: var(--bg-gradient); 
            color: var(--text-light); 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .scanner-card {
            background: var(--card-blue);
            width: 100%;
            max-width: 430px;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
        h1 span { color: var(--accent-blue); }
        p.subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; line-height: 1.5; }

        /* KOTAK SCANNER QR */
        .preview-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #050814;
            border-radius: 20px;
            overflow: hidden;
            border: 2px dashed #1E293B;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Target Elemen Video dari Library HTML5-QRCode */
        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }
        #reader video {
            object-fit: cover !important;
        }

        .placeholder-box {
            position: absolute;
            text-align: center;
            z-index: 1;
            transition: all 0.3s;
        }
        .placeholder-box i { font-size: 4.5rem; color: #1E293B; margin-bottom: 10px; }
        .placeholder-box p { color: var(--text-muted); font-size: 0.85rem; }

        /* TOMBOL UTAMA */
        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue) 0%, #1D4ED8 100%);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

    <div class="scanner-card">
        <h1>Scan QR <span>Absensi</span></h1>
        <p class="subtitle">Arahkan kamera HP lu tepat ke QR Code ID Card Santri untuk mencatat kehadiran.</p>

        <div class="preview-wrapper" id="boxWrapper">
            <div class="placeholder-box" id="placeholder">
                <i class="fa-solid fa-qrcode"></i>
                <p>Kamera belum aktif bray</p>
            </div>
            <div id="reader"></div>
        </div>

        <button class="btn-action" id="actionBtn">
            <i class="fa-solid fa-camera"></i> Aktifkan Kamera Scanner
        </button>
    </div>

    <script>
        let html5Qrcode;
        let isScanning = false;

        const actionBtn = document.getElementById('actionBtn');
        const placeholder = document.getElementById('placeholder');
        const boxWrapper = document.getElementById('boxWrapper');

        actionBtn.addEventListener('click', async () => {
            // Instansiasi objek scanner ke div #reader bray
            if (!html5Qrcode) {
                html5Qrcode = new Html5Qrcode("reader");
            }

            if (!isScanning) {
                // 1. GAS START SCANNING
                placeholder.style.display = 'none';
                boxWrapper.style.border = `2px solid var(--accent-blue)`;
                boxWrapper.style.boxShadow = `0 0 25px rgba(59, 130, 246, 0.4)`;

                const config = { 
                    fps: 15, // Kecepatan scan frame per detik (makin tinggi makin responsif)
                    qrbox: (width, height) => {
                        return { width: width * 0.7, height: height * 0.7 } // Ukuran kotak target scan di tengah
                    }
                };

                try {
                    // Paksa pakai kamera belakang (facingMode environment)
                    await html5Qrcode.start(
                        { facingMode: "environment" }, 
                        config,
                        // Kalo sukses dapet teks QR Code
                        (decodedText) => {
                            isScanning = false;
                            html5Qrcode.stop(); // Matikan kamera biar ga nge-loop scan terus
                            
                            // Efek kosmetik sukses
                            actionBtn.style.background = 'linear-gradient(135deg, #10B981 0%, #059669 100%)';
                            actionBtn.innerHTML = '<i class="fa-solid fa-camera"></i> Aktifkan Kamera Scanner';
                            placeholder.style.display = 'block';
                            placeholder.innerHTML = `<i class="fa-solid fa-circle-check" style="color: var(--accent-green)"></i><p style="color: white; font-weight: 700;">TER-SCAN BRAY!<br><span style="color: var(--accent-blue);">${decodedText}</span></p>`;
                            boxWrapper.style.border = `2px solid var(--accent-green)`;
                            boxWrapper.style.boxShadow = `0 0 25px rgba(16, 185, 129, 0.4)`;

                            // 🚨 NOTIFIKASI SEMENTARA SEBELUM DIKIRIM KE SPREADSHEET
                            alert(`BOOM! QR Code Terbaca: ${decodedText}`);
                        },
                        // Kalo gagal scan (biasanya karena gerak atau burem, di-ignore biar terus nyari)
                        (errorMessage) => {
                            // Biarkan kosong biar dia nyari terus sampai dapet fokus yang pas
                        }
                    );

                    isScanning = true;
                    actionBtn.style.background = 'linear-gradient(135deg, #EF4444 0%, #B91C1C 100%)';
                    actionBtn.innerHTML = '<i class="fa-solid fa-stop"></i> Matikan Scanner';

                } catch (error) {
                    console.error("Gagal dapet izin:", error);
                    alert("Waduh gagal bray, pastiin lu izinin akses kamera pas pop-up muncul!");
                    placeholder.style.display = 'block';
                    boxWrapper.style.border = `2px dashed #1E293B`;
                    boxWrapper.style.boxShadow = `none`;
                }

            } else {
                // 2. KALO DIKLIK PAS LAGI AKTIF -> MATIKAN SCANNER
                try {
                    await html5Qrcode.stop();
                    isScanning = false;
                    actionBtn.style.background = 'linear-gradient(135deg, var(--accent-blue) 0%, #1D4ED8 100%)';
                    actionBtn.innerHTML = '<i class="fa-solid fa-camera"></i> Aktifkan Kamera Scanner';
                    placeholder.style.display = 'block';
                    placeholder.innerHTML = `<i class="fa-solid fa-qrcode"></i><p>Kamera belum aktif bray</p>`;
                    boxWrapper.style.border = `2px dashed #1E293B`;
                    boxWrapper.style.boxShadow = `none`;
                } catch (err) {
                    console.error(err);
                }
            }
        });
    </script>

</body>
</html>
