<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markaz Space Shooter | Single Player Mode</title>
    
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-space: #020617; --bg-card: #0f172a; --accent-glow: #3b82f6;   
            --text-main: #f8fafc; --text-dim: #94a3b8; --success: #10b981;
            --neon-glow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-space); color: var(--text-main); overflow: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* HEADER */
        header { width: 100%; padding: 15px 6%; background-color: var(--bg-card); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100; }
        .back-btn { color: var(--text-dim); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-btn:hover { color: var(--accent-glow); }
        .header-title { font-weight: 700; color: var(--accent-glow); letter-spacing: 1px; }

        /* 1. SELECTION SCREEN */
        #selection-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; padding: 20px; transition: 0.5s; }
        #selection-screen h1 { font-size: 28px; font-weight: 800; margin-bottom: 10px; text-align: center; text-shadow: var(--neon-glow); color: var(--accent-glow); }
        #selection-screen p { color: var(--text-dim); text-align: center; margin-bottom: 40px; font-size: 13px; max-width: 500px; }
        .ship-options { display: flex; gap: 20px; max-width: 600px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .ship-card { background: var(--bg-card); border: 2px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; width: 260px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .ship-card:hover { border-color: var(--accent-glow); transform: translateY(-5px); box-shadow: var(--neon-glow); }
        
        /* Preview kapal pake CSS Vector */
        .ship-preview-box { height: 70px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .preview-speedster { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 45px solid #3b82f6; filter: drop-shadow(0 0 8px #3b82f6); }
        .preview-tank { width: 40px; height: 45px; background: #10b981; border-radius: 6px; position: relative; filter: drop-shadow(0 0 8px #10b981); }
        .preview-tank::before { content:''; position: absolute; top: -10px; left: 15px; width: 10px; height: 15px; background: #0f766e; }

        .ship-card h3 { font-size: 16px; margin-bottom: 5px; }
        .ship-card .stats { font-size: 11px; color: var(--text-dim); margin-bottom: 15px; line-height: 1.6; }
        .ship-card span.stat-val { color: var(--success); font-weight: 600; }
        .btn-select { background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 20px; font-weight: 600; font-size: 12px; cursor: pointer; width: 100%; }
        .ship-card:hover .btn-select { background: var(--accent-glow); box-shadow: 0 0 10px rgba(59, 130, 246, 0.8); }

        /* 2. GAME SCREEN */
        #game-screen { display: none; position: relative; width: 100%; flex-grow: 1; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        canvas { background-color: #020617; border: 2px solid rgba(255,255,255,0.05); border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; aspect-ratio: 5/6; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); display: flex; font-size: 15px; font-weight: 700; color: white; background: rgba(15, 23, 42, 0.8); padding: 8px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(5px); z-index: 20; width: 90%; max-width: 450px; justify-content: center; }
        #boss-health-container { display: none; margin-top: 10px; width: 90%; max-width: 450px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 10px; overflow: hidden; z-index: 30; }
        #boss-health-bar { height: 80px; background: #ef4444; width: 100%; transition: 0.1s; box-shadow: 0 0 10px rgba(239, 68, 68, 0.7); }

        /* 3. GAME OVER OVERLAY */
        #end-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(1, 4, 9, 0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #end-title { font-size: 36px; font-weight: 800; margin-bottom: 10px; text-align: center; }
        #end-score { font-size: 18px; color: var(--text-dim); margin-bottom: 40px; }
        .end-actions { display: flex; gap: 15px; width: 100%; max-width: 400px; }
        .btn-end { flex: 1; padding: 12px; border-radius: 30px; font-family: 'Poppins'; font-weight: 600; cursor: pointer; transition: 0.3s; border: none; font-size: 13px; }
        .btn-restart { background-color: var(--accent-glow); color: white; box-shadow: var(--neon-glow); }
        .btn-exit { background-color: transparent; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header>
        <a href="ruang-game.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Keluar</a>
        <div class="header-title"><i class="fa-solid fa-rocket"></i> SPACE SHOOTER V1</div>
    </header>

    <div id="selection-screen">
        <h1>MARSHAL, PILIH ARMADA LU!</h1>
        <p>Final Boss alien mothership udah deket, tentuin nasib Markaz sekarang bray.</p>
        
        <div class="ship-options">
            <div class="ship-card" onclick="pilihPesawat(0)">
                <div class="ship-preview-box"><div class="preview-speedster"></div></div>
                <h3>MARKAZ SPEEDSTER V1</h3>
                <p class="stats">Speed: <span class="stat-val">⚡⚡⚡⚡⚡</span><br>Fires: <span class="stat-val">Cepat 🔫</span></p>
                <button class="btn-select">PILIH MODEL INI</button>
            </div>
            
            <div class="ship-card" onclick="pilihPesawat(1)">
                <div class="ship-preview-box"><div class="preview-tank"></div></div>
                <h3>MARKAZ TANK V1</h3>
                <p class="stats">Speed: <span class="stat-val">⚡⚡⚡</span><br>Fires: <span class="stat-val">Sakit 🔥</span></p>
                <button class="btn-select">PILIH MODEL INI</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div id="ui">
            <div>SKOR JALUR DEWA: <span id="currentScore" style="color: var(--success);">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="500" height="600"></canvas>
        
        <div id="boss-health-container">
            <div style="font-size: 10px; color: #ef4444; padding: 4px 10px; text-transform: uppercase; font-weight: 700; text-align: center;">FINAL BOSS: ALIEN MOTHERSHIP</div>
            <div style="width: 100%; background: #334155; height: 10px;"><div id="boss-health-bar"></div></div>
        </div>
    </div>

    <div id="end-overlay">
        <h1 id="end-title">GAME OVER</h1>
        <p id="end-score">Skor Akhir: 0</p>
        <div class="end-actions">
            <button class="btn-end btn-restart" onclick="window.location.reload()"><i class="fa-solid fa-rotate-right"></i> MAIN LAGI</button>
            <button class="btn-end btn-exit" onclick="window.location.href='ruang-game.html'"><i class="fa-solid fa-door-open"></i> KELUAR</button>
        </div>
    </div>

    <script>
        const selectScreen = document.getElementById('selection-screen');
        const gameScreen = document.getElementById('game-screen');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('currentScore');
        const bossHealthContainer = document.getElementById('boss-health-container');
        const bossHealthBar = document.getElementById('boss-health-bar');
        const endOverlay = document.getElementById('end-overlay');

        // Data Tipe Pesawat Player (Pure Engine Vector)
        const playerShipModels = [
            { type: 'speedster', speed: 8, fireRate: 150, color: '#3b82f6' }, 
            { type: 'tank', speed: 5, fireRate: 300, color: '#10b981' }   
        ];

        // Engine State
        let player = { x: 225, y: 500, width: 50, height: 50, speed: 5, color: '#3b82f6' };
        let bullets = [];
        let enemies = [];
        let stars = []; // Efek bintang gerak buatan kode internal
        let boss = { x: 150, y: -150, width: 200, height: 80, health: 50, maxHealth: 50, active: false, dx: 2, dy: 0.5 };
        
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, KeyW: false, KeyS: false, KeyA: false, KeyD: false };
        let score = 0;
        let isGameOver = false;
        let lastFireTime = 0;
        let selectedShipData = null;

        // BIKIN MATRIKS BINTANG PROSEDURAL (Biar ada efek terbang)
        for (let i = 0; i < 40; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 2 + 1 });
        }

        function pilihPesawat(index) {
            selectedShipData = playerShipModels[index];
            player.color = selectedShipData.color;
            player.speed = selectedShipData.speed;

            selectScreen.style.opacity = 0;
            setTimeout(() => {
                selectScreen.style.display = 'none';
                gameScreen.style.display = 'flex';
                resetGame();
                update(); // Jalankan Loop Game
            }, 400);
        }

        // CONTROL KEYBOARD (LAPTOP)
        window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.code)) keys[e.code] = true; });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.code)) keys[e.code] = false; });
        
        // CONTROL TOUCH SCREEN (HP) - DRAG & DROP POSITIONING
        canvas.addEventListener('touchmove', e => {
            if (isGameOver) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            
            // Konversi posisi sentuhan jari ke koordinat Canvas internal
            let targetX = (touch.clientX - rect.left) * (canvas.width / rect.width) - player.width/2;
            let targetY = (touch.clientY - rect.top) * (canvas.height / rect.height) - player.height/2;
            
            player.x = targetX;
            player.y = targetY;
        }, { passive: false });

        // SPAWNER MUSUH KROCO
        function spawnEnemy() {
            if(boss.active || isGameOver || !selectedShipData) return;
            enemies.push({
                x: Math.random() * (canvas.width - 35),
                y: -40, width: 35, height: 35, speed: Math.random() * 2 + 2,
                color: `hsl(${Math.random() * 40 + 340}, 80%, 60%)` // Variasi warna merah alien
            });
        }
        setInterval(spawnEnemy, 800);

        // MEKANIK TEMBAK OTOMATIS (Biar di HP tinggal gerakin jari doang)
        function autoShoot() {
            const now = Date.now();
            if (now - lastFireTime > selectedShipData.fireRate) {
                bullets.push({ x: player.x + player.width/2 - 3, y: player.y - 15, width: 6, height: 15 });
                lastFireTime = now;
            }
        }

        function checkCollision(obj1, obj2) {
            return obj1.x < obj2.x + obj2.width && obj1.x + obj1.width > obj2.x && obj1.y < obj2.y + obj2.height && obj1.y + obj1.height > obj2.y;
        }

        function triggerGameOver() {
            isGameOver = true;
            document.getElementById('end-score').innerText = "Skor Akhir Lu: " + score;
            endOverlay.style.display = 'flex';
        }

        function triggerWin() {
            isGameOver = true;
            document.getElementById('end-title').innerText = "MISSION SUCCESS! 🎉";
            document.getElementById('end-title').style.color = "var(--success)";
            document.getElementById('end-score').innerText = "Mothership Alien Hancur Total! Skor Akhir: " + score;
            endOverlay.style.display = 'flex';
        }

        // 🔥 THE ENGINE LOOP GAMEPLAY AUTOMATION 🔥
        function update() {
            if (isGameOver) return;
            
            // A. Clear Screen & Draw Bintang
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > canvas.height) s.y = 0;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });

            // B. Gerakan Player Keyboard
            if (keys.ArrowUp || keys.KeyW) player.y -= player.speed;
            if (keys.ArrowDown || keys.KeyS) player.y += player.speed;
            if (keys.ArrowLeft || keys.KeyA) player.x -= player.speed;
            if (keys.ArrowRight || keys.KeyD) player.x += player.speed;
            
            // Batas Dinding Arena
            if(player.x < 0) player.x = 0; if(player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if(player.y < 0) player.y = 0; if(player.y + player.height > canvas.height) player.y = canvas.height - player.height;

            // Trigger Tembak Otomatis
            autoShoot();

            // C. Gambar Player (Sistem Vector Neon Glow)
            ctx.shadowBlur = 15; ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            if (selectedShipData.type === 'speedster') {
                // Gambar Segitiga Jet Tempur yang Sleek
                ctx.beginPath();
                ctx.moveTo(player.x + player.width/2, player.y);
                ctx.lineTo(player.x, player.y + player.height);
                ctx.lineTo(player.x + player.width, player.y + player.height);
                ctx.closePath();
                ctx.fill();
            } else {
                // Gambar Tank Tempur Armor Kotak Gahar
                ctx.fillRect(player.x, player.y + 10, player.width, player.height - 10);
                ctx.fillStyle = '#0f766e';
                ctx.fillRect(player.x + player.width/2 - 6, player.y, 12, 15);
            }
            ctx.shadowBlur = 0; // Reset efek glow

            // D. Update & Gambar Peluru
            ctx.fillStyle = '#38bdf8';
            ctx.shadowBlur = 10; ctx.shadowColor = '#38bdf8';
            bullets.forEach((b, bi) => {
                b.y -= 10; // Kecepatan peluru naik
                ctx.fillRect(b.x, b.y, b.width, b.height);
                if (b.y < -20) bullets.splice(bi, 1);
            });
            ctx.shadowBlur = 0;

            // E. Update & Gambar Kroco Alien
            enemies.forEach((e, ei) => {
                e.y += e.speed;
                
                // Draw Alien Bentuk Belah Ketupat Merah Glowing
                ctx.fillStyle = e.color;
                ctx.shadowBlur = 8; ctx.shadowColor = e.color;
                ctx.beginPath();
                ctx.moveTo(e.x + e.width/2, e.y);
                ctx.lineTo(e.x + e.width, e.y + e.height/2);
                ctx.lineTo(e.x + e.width/2, e.y + e.height);
                ctx.lineTo(e.x, e.y + e.height/2);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;

                // Cek Tabrakan Peluru -> Alien Kroco
                bullets.forEach((b, bi) => {
                    if (checkCollision(b, e)) {
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        scoreElement.innerText = score;
                    }
                });

                // Cek Tabrakan Kroco -> Player
                if (checkCollision(player, e)) triggerGameOver();

                if (e.y > canvas.height) enemies.splice(ei, 1);
            });

            // F. 👑 KONDISI BANGKITNYA FINAL BOSS MOTHERSHIP 👑
            if (score >= 200 && !boss.active) {
                boss.active = true;
                enemies = []; // Hapus kroco biar fokus by-one
                bossHealthContainer.style.display = 'block';
            }

            if (boss.active) {
                // Animasi Masuk Screen
                if (boss.y < 40) {
                    boss.y += boss.dy;
                } else {
                    // Pola Gerak Kanan-Kiri Boss
                    boss.x += boss.dx;
                    if(boss.x < 10 || boss.x + boss.width > canvas.width - 10) boss.dx *= -1;
                }

                // Gambar Induk Alien Mothership Raksasa (Ungu Metalik)
                ctx.fillStyle = '#a855f7';
                ctx.shadowBlur = 20; ctx.shadowColor = '#a855f7';
                ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
                // Inti Senjata Boss Tengah
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(boss.x + boss.width/2 - 20, boss.y + boss.height - 10, 40, 15);
                ctx.shadowBlur = 0;

                // Cek Tabrakan Peluru -> Final Boss
                bullets.forEach((b, bi) => {
                    if (checkCollision(b, boss)) {
                        bullets.splice(bi, 1);
                        boss.health -= 1;
                        
                        let persenDarah = (boss.health / boss.maxHealth) * 100;
                        bossHealthBar.style.width = persenDarah + '%';
                        score += 5;
                        scoreElement.innerText = score;

                        if (boss.health <= 0) triggerWin();
                    }
                });

                // Jika player nekat tabrakan sama tubuh raksasa boss
                if(checkCollision(player, boss)) triggerGameOver();
            }

            requestAnimationFrame(update);
        }

        function resetGame() {
            player.x = 225; player.y = 500; bullets = []; enemies = []; score = 0; scoreElement.innerText = 0; isGameOver = false; boss.active = false; boss.y = -150; boss.x = 150; boss.health = boss.maxHealth; bossHealthBar.style.width = '100%'; bossHealthContainer.style.display = 'none'; endOverlay.style.display = 'none';
        }
    </script>
</body>
</html>
